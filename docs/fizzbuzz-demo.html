<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FizzBuzz Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; padding: 1.5rem; max-width: 800px; margin: 0 auto; }
    label { display:block; margin:0.5rem 0 0.25rem 0; }
    input { padding: 0.4rem; width: 6rem; }
    button { padding: 0.5rem 1rem; margin-top: 0.5rem; }
    #fizz-output { white-space: pre-wrap; background:#f6f8fa; padding:1rem; border-radius:6px; margin-top:1rem; }
    #fizz-error { color: #c00; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>FizzBuzz Demo</h1>
  <form id="fizz-form" onsubmit="return false;">
    <label for="fizz-start">Start (integer)</label>
    <input id="fizz-start" name="start" value="1" />

    <label for="fizz-end">End (integer)</label>
    <input id="fizz-end" name="end" value="5" />

    <div>
      <button id="fizz-gen" type="button">Generate</button>
    </div>
  </form>

  <div id="fizz-error" role="status" aria-live="polite"></div>
  <div id="fizz-output" aria-live="polite"></div>

  <script type="module">
    import { attachDemo } from './fizzbuzz-demo.js';
    attachDemo(document);
  </script>
</body>
</html>
