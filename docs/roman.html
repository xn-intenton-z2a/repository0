<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Roman Numerals Demo</title>
  <style>
    body{font-family:system-ui, -apple-system, sans-serif;max-width:720px;margin:2rem auto;padding:1rem}
    label{display:block;margin-top:1rem}
    input{width:100%;padding:0.5rem}
    .error{color:#c00}
    .result{background:#f6f8fa;padding:0.5rem;margin-top:0.5rem;font-family:monospace}
  </style>
</head>
<body>
  <h1>Roman Numerals Demo</h1>
  <section>
    <h2>Number → Roman</h2>
    <label>Integer (1..3999): <input data-test-id="number-input" id="number-input" type="text" value="1994"></label>
    <button data-test-id="number-convert" id="number-convert">Convert to Roman</button>
    <div data-test-id="number-output" id="number-output" class="result" aria-live="polite"></div>
    <div data-test-id="number-error" id="number-error" class="error" role="alert"></div>
  </section>

  <section>
    <h2>Roman → Number</h2>
    <label>Roman: <input data-test-id="roman-input" id="roman-input" type="text" value="MCMXCIV"></label>
    <button data-test-id="roman-convert" id="roman-convert">Convert to Number</button>
    <div data-test-id="roman-output" id="roman-output" class="result" aria-live="polite"></div>
    <div data-test-id="roman-error" id="roman-error" class="error" role="alert"></div>
  </section>

  <script type="module">
    import { toRoman, fromRoman, name, version } from '../lib/main.js';
    document.getElementById('number-convert').addEventListener('click', ()=>{
      const out = document.getElementById('number-output');
      const err = document.getElementById('number-error');
      out.textContent = ''; err.textContent = '';
      const v = Number(document.getElementById('number-input').value);
      try {
        out.textContent = toRoman(v);
      } catch (e) {
        err.textContent = e.name + ': ' + e.message;
      }
    });
    document.getElementById('roman-convert').addEventListener('click', ()=>{
      const out = document.getElementById('roman-output');
      const err = document.getElementById('roman-error');
      out.textContent = ''; err.textContent = '';
      const v = document.getElementById('roman-input').value;
      try {
        out.textContent = String(fromRoman(v));
      } catch (e) {
        err.textContent = e.name + ': ' + e.message;
      }
    });
    // initial render
    document.getElementById('number-convert').click();
    document.getElementById('roman-convert').click();
  </script>
</body>
</html>
