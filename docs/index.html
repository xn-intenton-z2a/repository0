<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repository0</title>
  <meta property="og:title" content="repository0">
  <meta property="og:description" content="An autonomous repository powered by agentic-lib">
  <meta property="og:type" content="website">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #333; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    a { color: #0366d6; }
    .identity { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }
    .identity dt { font-weight: bold; color: #666; }
    .identity dd { margin: 0 0 0.5rem 0; font-size: 1.1rem; }
    #demo-output { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; font-family: monospace; white-space: pre-wrap; min-height: 2rem; }
    .examples { margin-top: 1rem; }
    .example { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>
  <h2>FizzBuzz Demo</h2>
  <div class="examples">
    <div class="example">
      <strong>fizzBuzz(15):</strong>
      <div id="fizz-15" aria-live="polite">Loading...</div>
    </div>
    <div class="example">
      <strong>fizzBuzzSingle examples:</strong>
      <ul>
        <li>3 ⇒ <span id="single-3">…</span></li>
        <li>5 ⇒ <span id="single-5">…</span></li>
        <li>15 ⇒ <span id="single-15">…</span></li>
        <li>7 ⇒ <span id="single-7">…</span></li>
      </ul>
    </div>
  </div>
  <h2>Output</h2>
  <div id="demo-output">Loading library...</div>
  <h2>About</h2>
  <p>This website uses the library. See <a href="https://github.com/xn-intenton-z2a/repository0">the repository</a> for source code and mission details.</p>
  <script type="module">
    try {
      const lib = await import('./lib.js');
      const { name, version, description, fizzBuzz, fizzBuzzSingle } = lib;
      document.getElementById('lib-name').textContent = name;
      document.getElementById('lib-version').textContent = version;
      document.getElementById('lib-description').textContent = description || '(no description)';
      document.getElementById('demo-output').textContent = JSON.stringify({ name, version, description }, null, 2);

      // Demo: fizzBuzz(15)
      try {
        const arr = fizzBuzz(15);
        document.getElementById('fizz-15').textContent = arr.join(', ');
      } catch (e) {
        document.getElementById('fizz-15').textContent = 'Error: ' + e.message;
      }

      // Single examples
      document.getElementById('single-3').textContent = fizzBuzzSingle(3);
      document.getElementById('single-5').textContent = fizzBuzzSingle(5);
      document.getElementById('single-15').textContent = fizzBuzzSingle(15);
      document.getElementById('single-7').textContent = fizzBuzzSingle(7);

      document.title = name + ' v' + version;
    } catch (e) {
      document.getElementById('lib-version').textContent = '(error)';
      document.getElementById('lib-description').textContent = e.message;
      document.getElementById('demo-output').textContent = 'Failed to load library: ' + e.message;
    }
  </script>
</body>
</html>
