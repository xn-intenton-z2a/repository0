<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FizzBuzz Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; color: #333; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    .controls { margin: 1rem 0; }
    input[type=number]{ width: 6rem; padding: 0.25rem; }
    button { padding: 0.35rem 0.6rem; }
    #fizz-buzz-output { margin-top: 1rem; }
    #fizz-buzz-output li { padding: 0.15rem 0; }
  </style>
</head>
<body>
  <h1>FizzBuzz Demo</h1>
  <div class="controls">
    <label for="fizz-buzz-input">N:</label>
    <input id="fizz-buzz-input" type="number" min="1" value="15">
    <button id="fizz-buzz-run">Run</button>
  </div>
  <ol id="fizz-buzz-output" aria-live="polite"></ol>

  <script type="module" src="./fizzbuzz-client.js"></script>
</body>
</html>
