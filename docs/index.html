<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repository0 — Plot Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #333; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    .identity { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }
    #demo-output { background: #fff; padding: 1rem; border-radius: 6px; min-height: 2rem; }
    #plot { margin-top: 1rem; }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>
  <h2>Plot Demo</h2>
  <div id="demo-output">Loading demo...</div>
  <div id="plot"></div>
  <script type="module">
    try {
      const { name, version, description, parseExpression, generateSeriesFromRange, renderSVG } = await import('./lib.js');
      document.getElementById('lib-name').textContent = name;
      document.getElementById('lib-version').textContent = version;
      document.getElementById('lib-description').textContent = description || '(no description)';
      document.title = name + ' v' + version;

      // Demo: plot y = Math.sin(x)
      const expr = 'y=Math.sin(x)';
      const range = '-3.14:0.1:3.14';
      const fn = parseExpression(expr);
      const series = generateSeriesFromRange(range, fn);
      const svg = renderSVG(series, { width: 700, height: 200, stroke: '#2b6cb0', strokeWidth: 2 });
      document.getElementById('demo-output').textContent = `Expression: ${expr}\nRange: ${range}\nPoints: ${series.length}`;
      document.getElementById('plot').innerHTML = svg;

    } catch (e) {
      document.getElementById('demo-output').textContent = 'Failed to load demo: ' + e.message;
    }
  </script>
</body>
</html>
