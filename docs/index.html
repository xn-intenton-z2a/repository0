<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamming Distance Demo</title>
  <style>
    body{font-family:system-ui, -apple-system, sans-serif;max-width:800px;margin:2rem auto;padding:1rem;color:#111}
    textarea{width:100%;height:6rem;font-family:monospace}
    .diff { background: #ffe6e6; }
    .highlight { background: #ffcccc; font-weight:700 }
    #result { margin-top:1rem; padding:0.5rem; border-radius:6px; background:#f6f8fa }
  </style>
</head>
<body>
  <h1>Hamming Distance Demo</h1>
  <p>Enter two equal-length strings or paste byte arrays in hex form for byte comparison.</p>

  <label for="input-a">Input A</label>
  <textarea id="input-a">abc</textarea>

  <label for="input-b">Input B</label>
  <textarea id="input-b">abd</textarea>

  <button id="compute-btn">Compute</button>

  <div id="result" aria-live="polite"></div>

  <script type="module">
    import lib from '/docs/lib-meta.js';
    // Load library from src for live demo (falls back to src/lib/main.js)
    import { hamming } from '../../src/lib/main.js';

    const aEl = document.getElementById('input-a');
    const bEl = document.getElementById('input-b');
    const btn = document.getElementById('compute-btn');
    const result = document.getElementById('result');

    function highlightDifferences(sa, sb) {
      if (sa.length !== sb.length) return null;
      let out = '';
      for (let i = 0; i < sa.length; i++) {
        if (sa.charCodeAt(i) !== sb.charCodeAt(i)) {
          out += `<span class="highlight">${escapeHtml(sa[i]||' ')}</span>`;
        } else {
          out += escapeHtml(sa[i]||' ');
        }
      }
      return out;
    }

    function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    btn.addEventListener('click', () => {
      const sa = aEl.value;
      const sb = bEl.value;
      try {
        const d = hamming(sa, sb);
        const highlighted = highlightDifferences(sa, sb);
        result.innerHTML = `<div><strong>Distance:</strong> ${d}</div>` + (highlighted ? `<div><strong>Differences:</strong><pre>${highlighted}</pre></div>` : '<div>Inputs must be same length to highlight differences.</div>');
      } catch (err) {
        result.textContent = err.message;
      }
    });

    // expose for tests
    window.__hammingDemo = { compute: () => { btn.click(); return result.innerHTML; } };
  </script>
</body>
</html>
