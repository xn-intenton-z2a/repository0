<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FizzBuzz Demo</title>
  <style>
    body { font-family: system-ui, Arial; padding: 2rem; }
    pre { background:#f6f8fa; padding:1rem; }
  </style>
</head>
<body>
  <h1>FizzBuzz Demo</h1>
  <p>Open the console or run <code>node src/lib/main.js 15</code> to see output.</p>
  <h2>Example sequence (15)</h2>
  <pre id="seq"></pre>
  <script type="module">
    import { fizzBuzz } from '../lib/main.js';
    document.getElementById('seq').textContent = fizzBuzz(15).join(', ');
  </script>
  <p><a href="https://github.com/">Repository</a></p>
</body>
</html>
