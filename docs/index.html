<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FizzBuzz demo</title>
  <style>body{font-family:system-ui, -apple-system, sans-serif;padding:2rem}</style>
</head>
<body>
  <h1>FizzBuzz Demo</h1>

  <section>
    <h2>Single</h2>
    <input id="single-input" type="number" value="15" />
    <button id="single-button">Check</button>
    <div id="single-output"></div>
  </section>

  <section>
    <h2>Range</h2>
    <label>Start <input id="range-start" type="number" value="1" /></label>
    <label>End <input id="range-end" type="number" value="5" /></label>
    <button id="range-button">Run</button>
    <ul id="range-output"></ul>
  </section>

  <script>
    function fizzValue(n){
      const num = Number(n);
      if (Number.isNaN(num)) return String(n);
      if (num % 15 === 0) return 'fizzbuzz';
      if (num % 3 === 0) return 'fizz';
      if (num % 5 === 0) return 'buzz';
      return String(num);
    }
    function fizzBuzz(start,end){
      const s = Number(start); const e = Number(end);
      const from = Math.min(s,e); const to = Math.max(s,e);
      const out = [];
      for(let i=from;i<=to;i++) out.push(fizzValue(i));
      return out;
    }

    document.getElementById('single-button').addEventListener('click', ()=>{
      const v = document.getElementById('single-input').value;
      document.getElementById('single-output').textContent = fizzValue(v);
    });

    document.getElementById('range-button').addEventListener('click', ()=>{
      const s = document.getElementById('range-start').value;
      const e = document.getElementById('range-end').value;
      const out = fizzBuzz(s,e);
      const ul = document.getElementById('range-output');
      ul.innerHTML = '';
      out.forEach(x=>{ const li = document.createElement('li'); li.textContent = x; ul.appendChild(li); });
    });

    // initialize
    document.getElementById('range-button').click();
  </script>
</body>
</html>
