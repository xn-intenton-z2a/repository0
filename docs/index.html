<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamming Distance Demo</title>
  <style>
    body{font-family:system-ui, -apple-system, sans-serif; max-width:800px;margin:2rem auto;color:#222}
    textarea{width:100%;height:4rem}
    .diff{background:#ffecec}
    .result{margin-top:1rem;padding:1rem;border:1px solid #eee}
    .highlight{background:#fffa8b}
  </style>
  <script type="module">
    import lib from '../../src/lib/main.js';
    // expose compute for tests
    window.hammingLib = lib;

    function highlightDiffs(a, b) {
      const out = [];
      const len = Math.min(a.length, b.length);
      for (let i=0;i<len;i++){
        if (a.charCodeAt(i)!==b.charCodeAt(i)) out.push(i);
      }
      return out;
    }

    window.addEventListener('DOMContentLoaded', ()=>{
      const aEl = document.getElementById('input-a');
      const bEl = document.getElementById('input-b');
      const btn = document.getElementById('compute');
      const out = document.getElementById('result');
      const preview = document.getElementById('preview');

      btn.addEventListener('click', ()=>{
        const a = aEl.value;
        const b = bEl.value;
        try{
          const d = lib.hamming(a,b);
          out.textContent = 'Distance: '+d;
          // render with highlights
          const diffs = highlightDiffs(a,b);
          let rendered = '';
          for(let i=0;i<Math.max(a.length,b.length);i++){
            const ca = a[i]||'';
            const cb = b[i]||'';
            const mark = diffs.includes(i) ? '<span class="highlight">'+(ca||' ')+'</span>' : (ca||' ');
            rendered += mark;
          }
          preview.innerHTML = rendered;
        }catch(err){
          out.textContent = 'Error: '+err.message;
          preview.innerHTML = '';
        }
      });
    });
  </script>
</head>
<body>
  <h1>Hamming Distance Demo</h1>
  <p>Enter two equal-length strings to compute the Hamming distance (code unit comparison).</p>
  <label>Input A<textarea id="input-a" aria-label="input-a">karolin</textarea></label>
  <label>Input B<textarea id="input-b" aria-label="input-b">kathrin</textarea></label>
  <button id="compute">Compute</button>
  <div class="result" id="result">Distance: </div>
  <div id="preview" aria-live="polite" style="margin-top:1rem;font-family:monospace;white-space:pre-wrap"></div>
</body>
</html>
