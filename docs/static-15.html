<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>FizzBuzz — static 15</title>
  <style>body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;background:#fff;padding:2rem;color:#222}pre{background:#f6f8fa;padding:1rem;border-radius:6px}</style>
</head>
<body>
  <h1>FizzBuzz — static 15</h1>
  <pre id="out">Loading...</pre>
  <script type="module">
    import { fizzBuzz } from './lib-browser.js';
    try {
      const arr = fizzBuzz(15);
      document.getElementById('out').textContent = arr.join('\n');
    } catch (e) {
      document.getElementById('out').textContent = 'Error: ' + e.message;
    }
  </script>
</body>
</html>
