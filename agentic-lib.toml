# agentic-lib.toml — Configuration for agentic-lib workflows
#
# Locally: paths point to test/ so dry-run workflows operate on test fixtures.
# During init:

[schedule]
supervisor = "continuous"              # off | weekly | daily | hourly | continuous

[paths]
mission = "MISSION.md"
source = "src/lib/"
tests = "tests/unit/"
features = "features/"
library = "library/"
docs = "docs/"
examples = "examples/"
readme = "README.md"
dependencies = "package.json"
contributing = "CONTRIBUTING.md"
library-sources = "SOURCES.md"

[execution]
build = "npm run build"
test = "npm test"
start = "npm run start"

[limits]
feature-issues = 2
maintenance-issues = 1
attempts-per-branch = 3
attempts-per-issue = 2
features-limit = 2
library-limit = 32

[tuning]
# Profile sets defaults for all tuning knobs: min | recommended | max
# min = fast & cheap (CI testing), recommended = balanced, max = thorough
profile = "recommended"
#
# Model selection — each has different strengths:
#   gpt-5-mini      — Fast, cheap, supports reasoning-effort. Best for CI and iteration.
#   claude-sonnet-4  — Strong code quality, nuanced reasoning. Best for complex transforms.
#   gpt-4.1         — High capability, large context. Best for thorough analysis.
# Note: reasoning-effort only works with gpt-5-mini and o4-mini.
# For other models it is automatically skipped.
model = "gpt-5-mini"
#
# Override individual knobs below. Omit or comment out to use profile defaults.
# reasoning-effort = "low"       # low | medium | high | none (none = disable entirely)
infinite-sessions = false        # set to true for long sessions with compaction
# features-scan = 3              # feature files to include in prompts
# source-scan = 3                # source files to include
# source-content = 1000          # max chars per source file
# issues-scan = 5                # open issues to include
# document-summary = 500         # max chars for document summaries
# discussion-comments = 5        # discussion comments to include

[bot]
log-file = "intentïon.md"
