# .github/agentic-lib/actions/commit-if-changed/action.yml
#
# Composite action: Commit and push if there are staged changes.
# Replaces the 8-line block repeated across 6 agent workflows.

name: "Commit if changed"
description: "Stage all changes, commit if any exist, and push"

inputs:
  commit-message:
    description: "Commit message"
    required: true
  push-ref:
    description: "Branch ref to push to (default: current ref_name)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Commit and push if changed
      shell: bash
      run: |
        git config --local user.email 'action@github.com'
        git config --local user.name 'GitHub Actions[bot]'
        git add -A
        # Unstage workflow files — GITHUB_TOKEN cannot push workflow changes
        git reset HEAD -- '.github/workflows/' 2>/dev/null || true
        # Unstage log/screenshot files — these live on the .logs branch
        git reset HEAD -- 'intentïon.md' 'intention.md' 'SCREENSHOT_INDEX.png' 2>/dev/null || true
        if git diff --cached --quiet; then
          echo "No changes to commit"
        fi
        if ! git diff --cached --quiet; then
          git commit -m "${{ inputs.commit-message }}"
          REF="${{ inputs.push-ref }}"
          MAX_RETRIES=3
          REMOTE_REF_EXISTS=""
          if [ -n "$REF" ]; then
            git ls-remote --exit-code origin "$REF" > /dev/null 2>&1 && REMOTE_REF_EXISTS="true"
          else
            REMOTE_REF_EXISTS="true"
          fi
          for attempt in $(seq 1 $MAX_RETRIES); do
            if [ -n "$REF" ]; then
              if [ "$REMOTE_REF_EXISTS" = "true" ]; then
                git pull --rebase origin "$REF" || {
                  echo "Rebase conflict on attempt $attempt — aborting rebase and retrying"
                  git rebase --abort 2>/dev/null || true
                  sleep $((attempt * 2))
                  continue
                }
              fi
              git push origin "$REF" && { REMOTE_REF_EXISTS="true"; break; }
            else
              git pull --rebase || {
                echo "Rebase conflict on attempt $attempt — aborting rebase and retrying"
                git rebase --abort 2>/dev/null || true
                sleep $((attempt * 2))
                continue
              }
              git push && break
            fi
            if [ "$attempt" -eq "$MAX_RETRIES" ]; then
              echo "::error::Failed to push after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "Push failed on attempt $attempt, retrying..."
            sleep $((attempt * 2))
          done
        fi
