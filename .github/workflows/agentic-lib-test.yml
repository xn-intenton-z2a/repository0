# .github/workflows/agentic-lib-test.yml
#
# Test workflow seeded by agentic-lib init.
# Also callable via workflow_call from the main pipeline.
#
# In agentic-lib: push/pull_request triggers are commented out.
# During init:

name: agentic-lib-test
run-name: "agentic-lib-test [${{ github.ref_name }}]"

concurrency:
  group: agentic-lib-test-${{ github.ref_name }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "10 * * * *"
  push:
    branches: [main]
    paths:
      - "**/*.js"
      - "**/*.json"
      - "**/*.html"
      - "**/*.yml"
      - "**/*.sh"
  pull_request:
    branches: [main]
    paths:
      - "**/*.js"
      - "**/*.json"
      - "**/*.html"
      - "**/*.yml"
      - "**/*.sh"
  workflow_call:
    inputs:
      push-screenshot:
        type: string
        required: false
        default: "false"
  workflow_dispatch:
    inputs:
      push-screenshot:
        description: "Push screenshot to main (default: only on schedule)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  actions: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Read test command from config
        id: config
        shell: bash
        run: |
          if [ -f agentic-lib.toml ]; then
            TEST_CMD=$(grep '^\s*test\s*=' agentic-lib.toml | head -1 | sed 's/.*=\s*"\([^"]*\)".*/\1/')
          fi
          echo "test-command=${TEST_CMD:-npm ci && npm test}" >> $GITHUB_OUTPUT

      - name: Install sub-project dependencies (agentic-lib dev only)
        if: hashFiles('src/actions/agentic-step/package.json') != ''
        run: cd src/actions/agentic-step && npm ci

      - name: Run tests
        run: ${{ steps.config.outputs.test-command }}

  behaviour:
    if: github.repository != 'xn-intenton-z2a/agentic-lib'
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Run behaviour tests
        run: npm run test:behaviour
        #env:
        #  HOME: /root

      - name: Upload screenshot
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: screenshot
          path: SCREENSHOT_INDEX.png
          if-no-files-found: ignore

      - name: Push screenshot on main
        if: |
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'schedule' || inputs.push-screenshot == 'true' || inputs.push-screenshot == true)
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SCREENSHOT_INDEX.png
          git diff --cached --quiet && echo "No screenshot changes" && exit 0
          git commit -m "test: update SCREENSHOT_INDEX.png [skip ci]"
          for attempt in 1 2 3; do
            git push origin HEAD:main && break
            echo "Push failed (attempt $attempt) — pulling and retrying"
            git pull --rebase origin main || {
              echo "Rebase conflict — aborting rebase and retrying"
              git rebase --abort 2>/dev/null || true
            }
            sleep $((attempt * 2))
            if [ "$attempt" -eq 3 ]; then
              echo "::warning::Failed to push screenshot after 3 attempts"
            fi
          done

  # ─── Dispatch fix workflow when tests fail on main ─────────────────
  dispatch-fix:
    needs: [test, behaviour]
    if: >-
      !cancelled()
      && github.ref == 'refs/heads/main'
      && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_call')
      && github.repository != 'xn-intenton-z2a/agentic-lib'
      && (needs.test.result == 'failure' || needs.behaviour.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Check circuit breaker
        id: breaker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Count agentic-lib-workflow dispatches in last 30 minutes
          SINCE=$(date -u -d '30 minutes ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-30M +%Y-%m-%dT%H:%M:%SZ)
          COUNT=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow agentic-lib-workflow.yml \
            --json createdAt \
            --jq "[.[] | select(.createdAt >= \"$SINCE\")] | length")
          echo "recent-dispatches=$COUNT"
          if [ "$COUNT" -ge 3 ]; then
            echo "Circuit breaker tripped: $COUNT dispatches in last 30 min"
            echo "tripped=true" >> $GITHUB_OUTPUT
          else
            echo "tripped=false" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch agentic-lib-workflow to fix broken build
        if: steps.breaker.outputs.tripped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Tests failed on main — dispatching agentic-lib-workflow to fix"
          gh workflow run agentic-lib-workflow.yml \
            --repo "${{ github.repository }}" \
            -f mode=full \
            -f message="Build broken on main: agentic-lib-test run ${{ github.run_id }} failed. Please fix."

  # ─── Report instability: create/update GitHub issue on test failure ──
  report-instability:
    needs: [test, behaviour]
    if: >-
      !cancelled()
      && github.ref == 'refs/heads/main'
      && github.repository != 'xn-intenton-z2a/agentic-lib'
      && (needs.test.result == 'failure' || needs.behaviour.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Determine failure type
        id: failure-type
        run: |
          UNIT="${{ needs.test.result }}"
          BEHAVIOUR="${{ needs.behaviour.result }}"
          if [ "$UNIT" = "failure" ] && [ "$BEHAVIOUR" = "failure" ]; then
            echo "type=both" >> $GITHUB_OUTPUT
          elif [ "$UNIT" = "failure" ]; then
            echo "type=unit" >> $GITHUB_OUTPUT
          else
            echo "type=behaviour" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies (non-blocking)
        id: install-deps
        run: |
          set +e
          INSTALL_CMD="npm ci"
          OUTPUT=$(eval "$INSTALL_CMD" 2>&1)
          EXIT_CODE=$?
          echo "exit-code=$EXIT_CODE" | tee -a $GITHUB_OUTPUT
          ERROR_COUNT=$(echo "$OUTPUT" | grep -oP '\d+ error' | head -1 | grep -oP '\d+' || echo "0")
          echo "error-count=$ERROR_COUNT" | tee -a $GITHUB_OUTPUT
          echo "$OUTPUT" | tail -100 > /tmp/install-output.txt
          echo "$OUTPUT"
          exit 0

      - name: Run unit tests (non-blocking)
        id: unit-tests
        run: |
          set +e
          TEST_CMD=""
          if [ -f agentic-lib.toml ]; then
            TEST_CMD=$(grep '^\s*test\s*=' agentic-lib.toml 2>/dev/null | head -1 | sed 's/.*=\s*"\([^"]*\)".*/\1/')
          fi
          TEST_CMD="${TEST_CMD:-npm test}"
          OUTPUT=$(eval "$TEST_CMD" 2>&1)
          EXIT_CODE=$?
          echo "exit-code=$EXIT_CODE" | tee -a $GITHUB_OUTPUT
          PASS_COUNT=$(echo "$OUTPUT" | grep -oP '\d+ pass' | head -1 | grep -oP '\d+' || echo "0")
          FAIL_COUNT=$(echo "$OUTPUT" | grep -oP '\d+ fail' | head -1 | grep -oP '\d+' || echo "0")
          echo "pass-count=$PASS_COUNT" | tee -a $GITHUB_OUTPUT
          echo "fail-count=$FAIL_COUNT" | tee -a $GITHUB_OUTPUT
          echo "$OUTPUT" | tail -100 > /tmp/unit-test-output.txt
          echo "$OUTPUT"
          exit 0

      - name: Run behaviour tests (non-blocking)
        id: behaviour-tests
        if: hashFiles('playwright.config.js') != '' || hashFiles('playwright.config.ts') != ''
        run: |
          set +e
          npx playwright install --with-deps chromium 2>/dev/null || true
          npm run build:web 2>/dev/null || true
          OUTPUT=$(npm run --if-present test:behaviour 2>&1)
          EXIT_CODE=$?
          echo "exit-code=$EXIT_CODE" | tee -a  $GITHUB_OUTPUT
          PASS_COUNT=$(echo "$OUTPUT" | grep -oP '\d+ passed' | head -1 | grep -oP '\d+' || echo "0")
          FAIL_COUNT=$(echo "$OUTPUT" | grep -oP '\d+ failed' | head -1 | grep -oP '\d+' || echo "0")
          echo "pass-count=$PASS_COUNT" | tee -a  $GITHUB_OUTPUT
          echo "fail-count=$FAIL_COUNT" | tee -a  $GITHUB_OUTPUT
          echo "$OUTPUT" | tail -50 > /tmp/behaviour-test-output.txt
          echo "$OUTPUT"
          exit 0

      - name: Create or update instability issue
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const failureType = '${{ steps.failure-type.outputs.type }}';
            const runId = '${{ github.run_id }}';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${runId}`;
            
            // Live test results from earlier steps
            const installOutput = fs.existsSync('/tmp/install-output.txt')
              ? fs.readFileSync('/tmp/install-output.txt', 'utf8').slice(0, 5000)
              : '';
            const unitOutput = fs.existsSync('/tmp/install-output.txt')
              ? fs.readFileSync('/tmp/install-output.txt', 'utf8').slice(0, 5000)
              : '';
            const behaviourOutput = fs.existsSync('/tmp/behaviour-test-output.txt')
              ? fs.readFileSync('/tmp/behaviour-test-output.txt', 'utf8').slice(0, 2500)
              : '';
            const logs = `=== Install Output ===\n${installOutput}\n\n=== Unit Test Output ===\n${unitOutput}\n\n=== Behaviour Test Output ===\n${behaviourOutput}`;
            
            const title = `instability: ${failureType} test failure on main`;
            const body = [
              `## Test Failure Report`,
              ``,
              `**Type**: ${failureType}`,
              `**Run**: [${runId}](${runUrl})`,
              `**Trigger**: ${context.eventName}`,
              `**Time**: ${new Date().toISOString()}`,
              ``,
              `## Failure Logs`,
              ``,
              '```',
              logs,
              '```',
            ].join('\n');

            // Check for existing open instability issue of the same failure type
            const { data: existing } = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'instability', per_page: 10,
            });

            const match = existing.find(i => i.title.includes(failureType));
            if (match) {
              // Add a comment with the new failure logs instead of creating a duplicate
              await github.rest.issues.createComment({
                ...context.repo, issue_number: match.number,
                body: `## Recurrence — run [${runId}](${runUrl})\n\n**Trigger**: ${context.eventName}\n**Time**: ${new Date().toISOString()}\n\n` + '```\n' + logs.slice(0, 30000) + '\n```',
              });
              core.info(`Updated existing instability issue #${match.number}`);
            } else {
              // Ensure instability label exists
              try {
                await github.rest.issues.createLabel({
                  ...context.repo, name: 'instability',
                  color: 'e11d48', description: 'Automated: test instability on main',
                });
              } catch (e) { /* label already exists */ }

              const { data: issue } = await github.rest.issues.create({
                ...context.repo, title, body,
                labels: ['instability', 'ready', 'automated'],
              });
              core.info(`Created instability issue #${issue.number}`);
            }
