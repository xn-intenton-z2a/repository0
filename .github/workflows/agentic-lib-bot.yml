# .github/workflows/agentic-lib-bot.yml
#
# Discussions bot: responds to GitHub Discussions using the Copilot SDK.
# Checks thread + repo context, responds, and can escalate to the main
# workflow by dispatching agentic-lib-workflow.yml with a message parameter.
#
# In agentic-lib: discussion triggers are commented out, dry-run defaults to true.
# During init:

name: agentic-lib-bot
run-name: "agentic-lib-bot [${{ github.ref_name }}]"
concurrency:
  group: agentic-lib-bot-${{ github.event.discussion.node_id || github.run_id }}
  cancel-in-progress: false

on:
  discussion:
    types:
      - created
      - edited
      - answered
      - unanswered
  discussion_comment:
    types:
      - created
      - edited
  workflow_call:
    inputs:
      discussion-url:
        type: string
        required: false
        default: ""
      model:
        type: string
        required: false
        default: "gpt-5-mini"
  workflow_dispatch:
    inputs:
      discussion-url:
        description: "Discussion URL to respond to"
        type: string
        required: false
        default: ""
      model:
        description: "Copilot SDK model to use"
        type: choice
        required: false
        default: "gpt-5-mini"
        options:
          - gpt-5-mini
          - claude-sonnet-4
          - gpt-4.1
      dry-run:
        description: "Skip all push/PR/merge operations"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  issues: write
  discussions: write
  actions: write

env:
  configPath: "agentic-lib.toml"

jobs:
  params:
    runs-on: ubuntu-latest
    steps:
      - name: Normalise params
        id: normalise
        shell: bash
        run: |
          MODEL='${{ inputs.model }}'
          echo "model=${MODEL:-gpt-5-mini}" >> $GITHUB_OUTPUT
          DRY_RUN='${{ inputs.dry-run }}'
          echo "dry-run=${DRY_RUN:-true}" >> $GITHUB_OUTPUT
    outputs:
      model: ${{ steps.normalise.outputs.model }}
      dry-run: ${{ steps.normalise.outputs.dry-run }}

  respond:
    needs: params
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.respond.outputs.action }}
      action-arg: ${{ steps.respond.outputs.action-arg }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Self-init (agentic-lib dev only)
        if: hashFiles('scripts/self-init.sh') != '' && hashFiles('.github/agentic-lib/actions/agentic-step/package.json') == ''
        run: bash scripts/self-init.sh

      - name: Install agentic-step dependencies
        working-directory: .github/agentic-lib/actions/agentic-step
        run: npm ci

      - name: Get discussion URL
        id: discussion-url
        uses: actions/github-script@v7
        with:
          script: |
            let url = '${{ inputs.discussion-url }}' || '';
            if (!url && context.payload.discussion) {
              url = context.payload.discussion.html_url;
            }
            core.setOutput('url', url);

      - name: Skip if comment is from bot
        id: guard
        shell: bash
        run: |
          COMMENT_USER='${{ github.event.comment.user.login }}'
          if [ "$COMMENT_USER" = "github-actions[bot]" ] || [ "$COMMENT_USER" = "github-actions" ]; then
            echo "Bot comment detected — skipping to avoid self-reply loop"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Respond to discussion
        id: respond
        if: steps.discussion-url.outputs.url != '' && steps.guard.outputs.skip != 'true'
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "discussions"
          config: ${{ env.configPath }}
          instructions: ".github/agentic-lib/agents/agent-discussion-bot.md"
          discussion-url: ${{ steps.discussion-url.outputs.url }}
          model: ${{ needs.params.outputs.model }}

  dispatch-supervisor:
    needs: [params, respond]
    if: github.repository != 'xn-intenton-z2a/agentic-lib' && needs.respond.outputs.action == 'request-supervisor'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch supervisor workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run agentic-lib-workflow.yml \
            --repo "${{ github.repository }}" \
            -f mode=full \
            -f model="${{ needs.params.outputs.model }}" \
            -f message="${{ needs.respond.outputs.action-arg }}"
