# .github/workflows/agent-flow-transform.yml
#
# Autonomous code transformation: Mission → Features → Issues → Code → PR
# Replaces the 10 transformation workflows with a single agentic-step call.

name: agent-flow-transform
run-name: "agent-flow-transform [${{ github.ref_name }}]"
concurrency:
  group: agentic-lib-transform
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: "Issue number to target (optional)"
        type: string
        required: false
        default: ""
      model:
        description: "Copilot SDK model to use"
        type: choice
        required: false
        default: "gpt-5-mini"
        options:
          - gpt-5-mini
          - claude-sonnet-4
          - gpt-4.1

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  configPath: ".github/agentic-lib/agents/agentic-lib.yml"

jobs:
  params:
    runs-on: ubuntu-latest
    steps:
      - name: Normalise params
        id: normalise
        shell: bash
        run: |
          MODEL='${{ inputs.model }}'
          echo "model=${MODEL:-gpt-5-mini}" >> $GITHUB_OUTPUT
    outputs:
      model: ${{ steps.normalise.outputs.model }}

  transform:
    needs: params
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine branch name
        id: branch
        shell: bash
        run: |
          ISSUE_NUMBER="${{ inputs.issue-number }}"
          if [ -n "$ISSUE_NUMBER" ]; then
            BRANCH="agentic-lib-issue-${ISSUE_NUMBER}"
          else
            BRANCH="agentic-lib-transform-${{ github.run_id }}"
          fi
          git checkout -b "${BRANCH}" 2>/dev/null || git checkout "${BRANCH}"
          echo "branchName=${BRANCH}" >> $GITHUB_OUTPUT
          echo "issueNumber=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install agentic-step dependencies
        working-directory: .github/agentic-lib/actions/agentic-step
        run: npm ci

      - name: Load config
        id: config
        run: |
          CONFIG="${{ env.configPath }}"
          SOURCE=$(yq -r '.paths.targetSourcePath.path // "src/lib/"' "$CONFIG")
          TESTS=$(yq -r '.paths.targetTestsPath.path // "tests/unit/"' "$CONFIG")
          FEATURES=$(yq -r '.paths.featuresPath.path // "features/"' "$CONFIG")
          DOCS=$(yq -r '.paths.documentationPath.path // "docs/"' "$CONFIG")
          LIBRARY=$(yq -r '.paths.libraryDocumentsPath.path // "library/"' "$CONFIG")
          SOURCES=$(yq -r '.paths.librarySourcesFilepath.path // "SOURCES.md"' "$CONFIG")
          README=$(yq -r '.paths.readmeFilepath.path // "README.md"' "$CONFIG")
          DEPS=$(yq -r '.paths.dependenciesFilepath.path // "package.json"' "$CONFIG")
          echo "writablePaths=${SOURCE};${TESTS};${FEATURES};${DOCS};${LIBRARY};${SOURCES};${README};${DEPS}" >> $GITHUB_OUTPUT

      - name: Run transformation step
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "transform"
          config: ${{ env.configPath }}
          instructions: ".github/agentic-lib/agents/agent-issue-resolution.md"
          test-command: "npm test"
          model: ${{ needs.params.outputs.model }}
          issue-number: ${{ inputs.issue-number }}
          writable-paths: ${{ steps.config.outputs.writablePaths }}

      - name: Commit and push changes
        uses: ./.github/agentic-lib/actions/commit-if-changed
        with:
          commit-message: "agentic-step: transform"
          push-ref: ${{ steps.branch.outputs.branchName }}
    outputs:
      branchName: ${{ steps.branch.outputs.branchName }}
      issueNumber: ${{ steps.branch.outputs.issueNumber }}

  create-pr:
    needs: [params, transform]
    if: always() && needs.transform.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if branch has changes
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branchName = '${{ needs.transform.outputs.branchName }}';
            const issueNumber = '${{ needs.transform.outputs.issueNumber }}';

            if (!branchName) {
              core.info('No branch name — skipping PR creation');
              return;
            }

            // Check if branch has commits ahead of main
            try {
              const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
                owner, repo,
                basehead: `main...${branchName}`,
              });
              if (comparison.ahead_by === 0) {
                core.info('Branch has no new commits — skipping PR creation');
                return;
              }
            } catch (err) {
              core.info(`Branch comparison failed (branch may not exist): ${err.message}`);
              return;
            }

            // Check if PR already exists for this branch
            const { data: existingPRs } = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              head: `${owner}:${branchName}`,
              per_page: 1,
            });
            if (existingPRs.length > 0) {
              core.info(`PR already exists: #${existingPRs[0].number}`);
              return;
            }

            // Create PR
            const title = issueNumber
              ? `fix: resolve issue #${issueNumber}`
              : `agentic-step: transform (run ${context.runId})`;
            const body = issueNumber
              ? `Closes #${issueNumber}\n\nAutomated transformation targeting issue #${issueNumber}.`
              : `Automated transformation run.`;

            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title,
              body,
              head: branchName,
              base: 'main',
            });
            core.info(`Created PR #${pr.number}: ${pr.html_url}`);

            // Add automerge label
            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: pr.number,
              labels: ['automerge'],
            });

            // Add in-progress label to issue if specified
            if (issueNumber) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: parseInt(issueNumber),
                  labels: ['in-progress'],
                });
              } catch (err) {
                core.warning(`Could not label issue #${issueNumber}: ${err.message}`);
              }
            }
