<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>FizzBuzz — interactive</title>
  <style>body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;padding:2rem}input{font-size:1rem;padding:.25rem;margin-right:.5rem}pre{background:#f6f8fa;padding:1rem;border-radius:6px}</style>
</head>
<body>
  <h1>FizzBuzz — interactive</h1>
  <p>Enter a non-negative integer and click Render</p>
  <input id="n" type="number" min="0" step="1" value="15"><button id="go">Render</button>
  <div id="msg" style="color:#900;margin-top:.5rem"></div>
  <pre id="out"></pre>
  <script type="module">
    import { fizzBuzz } from './lib-browser.js';
    const nInput = document.getElementById('n');
    const out = document.getElementById('out');
    const msg = document.getElementById('msg');
    document.getElementById('go').addEventListener('click', () => {
      msg.textContent = '';
      out.textContent = '';
      const raw = Number(nInput.value);
      try {
        const arr = fizzBuzz(raw);
        out.textContent = arr.join('\n');
      } catch (e) {
        msg.textContent = e.message;
      }
    });
  </script>
</body>
</html>
