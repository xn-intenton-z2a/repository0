<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roman Numerals Demo</title>
<style>body{font-family:system-ui, -apple-system, sans-serif;max-width:720px;margin:2rem auto;padding:1rem}label{display:block;margin-top:1rem}input{width:100%;padding:0.5rem}.result{background:#f6f8fa;padding:0.5rem;margin-top:0.5rem;font-family:monospace}.error{color:#c00}</style>
</head>
<body>
<h1>Roman Numerals Demo</h1>
<div class="identity">
  <dl>
    <dt id="lib-name">roman-numerals</dt>
    <dd id="lib-version">0.1.0</dd>
    <dd id="lib-desc">Convert between integers and Roman numerals</dd>
  </dl>
</div>
<section>
  <h2>Number → Roman</h2>
  <label>Integer (1..3999): <input id="num-input" type="text" value="1994"></label>
  <button id="num-convert">Convert to Roman</button>
  <div id="num-output" class="result" aria-live="polite"></div>
  <div id="num-error" class="error" role="alert" style="display:none"></div>
</section>
<section>
  <h2>Roman → Number</h2>
  <label>Roman numeral: <input id="roman-input" type="text" value="MCMXCIV"></label>
  <label><input type="radio" name="roman-mode" id="roman-strict" checked> Strict</label>
  <label><input type="radio" name="roman-mode" id="roman-permissive"> Permissive</label>
  <button id="roman-convert">Convert to number</button>
  <div id="roman-output" class="result" aria-live="polite"></div>
  <div id="roman-error" class="error" role="alert" style="display:none"></div>
  <div id="roman-canonical" class="result" aria-live="polite" style="margin-top:0.25rem"></div>
</section>
<script type="module">
import { toRoman, fromRoman, parseRoman } from '/src/lib/main.js'
// number -> roman
const numInput = document.getElementById('num-input')
const numConvert = document.getElementById('num-convert')
const numOutput = document.getElementById('num-output')
const numError = document.getElementById('num-error')
numConvert.addEventListener('click', () => {
  numError.style.display = 'none'
  try {
    const v = Number(numInput.value)
    const out = toRoman(v)
    numOutput.textContent = out
  } catch (err) {
    numOutput.textContent = ''
    numError.style.display = 'block'
    numError.textContent = err.message
  }
})
// roman -> number
const romanInput = document.getElementById('roman-input')
const romanConvert = document.getElementById('roman-convert')
const romanOutput = document.getElementById('roman-output')
const romanError = document.getElementById('roman-error')
const canonicalEl = document.getElementById('roman-canonical')
romanConvert.addEventListener('click', () => {
  romanError.style.display = 'none'
  canonicalEl.textContent = ''
  try {
    const strict = document.getElementById('roman-strict').checked
    const val = fromRoman(romanInput.value, { strict })
    romanOutput.textContent = String(val)
    const parsed = parseRoman(romanInput.value, { strict: false })
    canonicalEl.textContent = parsed.canonical
  } catch (err) {
    romanOutput.textContent = ''
    canonicalEl.textContent = ''
    romanError.style.display = 'block'
    romanError.textContent = err.message
  }
})
</script>
</body>
</html>
