<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fizz-buzz demo</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #222; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    #fizzbuzz-demo { background: #fafafa; padding: 1rem; border-radius: 6px; min-height: 3rem; }
    input[type="number"] { width: 6rem; }
    ul { padding-left: 1.2rem; }
  </style>
</head>
<body>
  <h1 id="lib-name">FizzBuzz Demo</h1>
  <div>
    <label for="fizzbuzz-n">n:</label>
    <input id="fizzbuzz-n" type="number" min="1" value="100" />
    <button id="fizzbuzz-render">Render</button>
  </div>
  <h2>Demo Output</h2>
  <div id="fizzbuzz-demo">Loading demo…</div>
  <h2>Usage</h2>
  <pre id="usage">Node API: import { generate } from './src/lib/main.js'\nCLI: node src/lib/main.js 20\nWeb: window.generateFizzBuzz(n) returns an Array</pre>

  <script type="module">
    import { fizzBuzz as browserGenerate } from './fizzbuzz-client.js';

    const demo = document.getElementById('fizzbuzz-demo');
    const input = document.getElementById('fizzbuzz-n');
    const btn = document.getElementById('fizzbuzz-render');

    function renderList(n) {
      try {
        const arr = (window.fizzBuzz || browserGenerate)(Number(n));
        const ul = document.createElement('ul');
        arr.forEach((v, idx) => {
          const li = document.createElement('li');
          li.setAttribute('data-index', String(idx+1));
          li.textContent = String(v);
          ul.appendChild(li);
        });
        demo.innerHTML = '';
        demo.appendChild(ul);
      } catch (err) {
        demo.textContent = err && err.message ? err.message : String(err);
      }
    }

    btn.addEventListener('click', () => renderList(input.value));
    document.addEventListener('DOMContentLoaded', () => renderList(input.value));
  </script>
</body>
</html>
