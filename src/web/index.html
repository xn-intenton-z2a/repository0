<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Roman Numerals Demo</title>
<style>
body{font-family:system-ui, -apple-system, sans-serif;max-width:760px;margin:2rem auto;color:#222}
label{display:block;margin-top:1rem}
input,button{font-size:1rem;padding:.5rem;margin-top:.25rem}
#result{background:#f6f8fa;padding:1rem;margin-top:1rem;border-radius:6px;font-family:monospace}
.error{color:#b00020}
</style>
</head>
<body>
<h1>Roman Numerals — Demo</h1>
<div>
  <label>Number (1..3999)
    <input id="num-input" type="number" min="1" max="3999" value="1994" />
  </label>
  <button id="to-roman">Convert to Roman</button>
</div>
<div>
  <label>Roman (uppercase canonical)
    <input id="roman-input" type="text" value="MCMXCIV" />
  </label>
  <button id="from-roman">Convert to Number</button>
</div>
<div id="result" aria-live="polite">Ready</div>
<script type="module">
import * as meta from '../docs/lib-meta.js';
import { toRoman, fromRoman } from './lib-browser.js';
const result = document.getElementById('result');
const numIn = document.getElementById('num-input');
const romanIn = document.getElementById('roman-input');
document.getElementById('to-roman').addEventListener('click', ()=>{
  try{
    const n = Number(numIn.value);
    const r = toRoman(n);
    result.classList.remove('error');
    result.textContent = `${n} → ${r}`;
  }catch(e){ result.classList.add('error'); result.textContent = e.name+': '+e.message }
});
document.getElementById('from-roman').addEventListener('click', ()=>{
  try{
    const s = romanIn.value.trim();
    const n = fromRoman(s);
    result.classList.remove('error');
    result.textContent = `${s} → ${n}`;
  }catch(e){ result.classList.add('error'); result.textContent = e.name+': '+e.message }
});
// show identity
const id = document.createElement('div'); id.style.marginTop='1rem'; id.style.fontSize='0.9rem'; id.textContent = `${meta.name}@${meta.version} — ${meta.description}`;
document.body.appendChild(id);
</script>
</body>
</html>
