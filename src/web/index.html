<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FizzBuzz Core Demo</title>
  <style>
    body{font-family:system-ui,Arial;margin:2rem}
    input,button{font-size:1rem;padding:0.4rem}
    pre{background:#f7f7f7;padding:1rem}
  </style>
</head>
<body>
  <h1>FizzBuzz Core — Live Demo</h1>
  <p>Enter a range to see FizzBuzz results generated by the library.</p>
  <label>Count (n): <input id="n" value="15" /></label>
  <button id="run">Run</button>
  <pre id="out"></pre>
  <script type="module">
    import { fizzBuzz } from '../../src/lib/main.js';
    const out = document.getElementById('out');
    document.getElementById('run').addEventListener('click', ()=>{
      const n = Number(document.getElementById('n').value);
      try{
        const res = fizzBuzz(n);
        out.textContent = JSON.stringify(res, null, 2);
      }catch(err){
        out.textContent = 'Error: '+err.message;
      }
    });
    // initial run
    document.getElementById('run').click();
  </script>
</body>
</html>
