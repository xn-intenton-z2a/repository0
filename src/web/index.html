<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>string-utils demo</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 2rem auto; padding: 1rem; }
    pre { background:#111; color:#ddd; padding:1rem; border-radius:6px; }
    .identity { background:#f6f8fa; padding:1rem; border-radius:6px; }
  </style>
</head>
<body>
  <h1 id="lib-name">string-utils</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>

  <h2>Demo output</h2>
  <pre id="demo-output">Loading...</pre>

  <script type="module">
    // import metadata generated by build:web
    try {
      const meta = await import('./lib-meta.js');
      document.getElementById('lib-name').textContent = meta.name;
      document.getElementById('lib-version').textContent = meta.version || '(no version)';
      document.getElementById('lib-description').textContent = meta.description || '(no description)';
    } catch (e) {
      document.getElementById('lib-version').textContent = '(build required)';
      document.getElementById('lib-description').textContent = 'Run npm run build:web';
    }

    // import browser-friendly functions
    try {
      const lib = await import('./lib-browser.js');
      const out = {};
      out.slugify = lib.slugify('Hello World!');
      out.truncate = lib.truncate('Hello World', 8);
      out.camelCase = lib.camelCase('foo-bar-baz');
      out.kebabCase = lib.kebabCase('Hello World');
      out.titleCase = lib.titleCase('hello world');
      out.levenshtein = lib.levenshteinDistance('kitten', 'sitting');
      document.getElementById('demo-output').textContent = JSON.stringify(out, null, 2);
    } catch (err) {
      document.getElementById('demo-output').textContent = 'Library not available: ' + String(err);
    }
  </script>
</body>
</html>
