<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FizzBuzz Demo</title>
  <style>body{font-family:system-ui, -apple-system, sans-serif;max-width:780px;margin:2rem auto;padding:1rem}label{display:inline-block;width:120px}</style>
</head>
<body>
  <h1 id="lib-name">FizzBuzz Demo</h1>
  <section>
    <h2>Single value</h2>
    <label for="fizz-input">Number</label>
    <input id="fizz-input" type="text" value="15" />
    <button id="fizz-submit">Submit</button>
    <div>Result: <span id="fizz-output" aria-live="polite"></span></div>
  </section>

  <section>
    <h2>Range</h2>
    <label for="fizz-range">Count (n)</label>
    <input id="fizz-range" type="text" value="0" />
    <button id="fizz-range-submit">Generate</button>
    <div>Result: <span id="fizz-range-output" aria-live="polite"></span></div>
  </section>

  <div role="status" id="fizz-error" style="color:crimson;margin-top:1rem"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
