<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repository0</title>
  <meta property="og:title" content="repository0">
  <meta property="og:description" content="An autonomous repository powered by agentic-lib">
  <meta property="og:type" content="website">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #333; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    a { color: #0366d6; }
    .identity { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }
    .identity dt { font-weight: bold; color: #666; }
    .identity dd { margin: 0 0 0.5rem 0; font-size: 1.1rem; }
    #demo-output { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; font-family: monospace; white-space: pre-wrap; min-height: 2rem; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>
  <h2>UUID Encoding Comparison</h2>
  <div id="demo-output">Loading encoding comparison...</div>

  <h2>About</h2>
  <p>This website uses the library. See <a href="https://github.com/xn-intenton-z2a/repository0">the repository</a> for source code and mission details.</p>
  <script type="module">
    try {
      const lib = await import('./lib.js');
      const { name, version, description, listEncodings, encode, uuidEncode } = lib;
      document.getElementById('lib-name').textContent = name;
      document.getElementById('lib-version').textContent = version;
      document.getElementById('lib-description').textContent = description || '(no description)';
      document.title = name + ' v' + version;

      // sample UUID bytes (hex)
      const sampleHex = '00112233445566778899aabbccddeeff';
      const bytes = new Uint8Array(sampleHex.match(/.{1,2}/g).map(h => parseInt(h, 16)));

      const encs = listEncodings();
      const rows = [];
      for (const e of encs) {
        try {
          const s = encode(e.name, bytes);
          rows.push({ name: e.name, bitsPerChar: Number(e.bitsPerChar.toFixed(4)), charsetSize: e.charsetSize, encoded: s, length: s.length });
        } catch (err) {
          rows.push({ name: e.name, error: String(err) });
        }
      }

      const out = [];
      out.push('Sample UUID (hex): ' + sampleHex);
      out.push('');
      out.push('Encodings:');
      for (const r of rows) {
        if (r.error) {
          out.push(`${r.name}: error: ${r.error}`);
        } else {
          out.push(`${r.name} (chars=${r.charsetSize}, bits/char=${r.bitsPerChar}) -> length=${r.length}\n${r.encoded}`);
        }
      }
      // show uuidEncode shorthand example
      try {
        const uuid = '00112233-4455-6677-8899-aabbccddeeff';
        const reversed = uuidEncode(uuid, encs[0].name);
        out.push('\nUUID shorthand (reversed) using ' + encs[0].name + ': ' + reversed);
      } catch (e) {
        out.push('uuidEncode error: ' + e.message);
      }

      document.getElementById('demo-output').textContent = out.join('\n');
    } catch (e) {
      document.getElementById('lib-version').textContent = '(error)';
      document.getElementById('lib-description').textContent = e.message;
      document.getElementById('demo-output').textContent = 'Failed to load library: ' + e.message;
    }
  </script>
</body>
</html>
